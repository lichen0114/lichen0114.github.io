<footer class="site-footer">
  <div class="container">
    <div class="social-links">
      {%- if site.social.github -%}
      <a href="https://github.com/{{ site.social.github }}" aria-label="GitHub" rel="me noopener" target="_blank">GitHub</a>
      {%- endif -%}
      {%- if site.social.twitter -%}
      <a href="https://twitter.com/{{ site.social.twitter }}" aria-label="Twitter" rel="me noopener" target="_blank">Twitter</a>
      {%- endif -%}
      {%- if site.social.linkedin -%}
      <a href="{{ site.social.linkedin }}" aria-label="LinkedIn" rel="me noopener" target="_blank">LinkedIn</a>
      {%- endif -%}
      {%- if site.social.email -%}
      <a href="mailto:{{ site.social.email }}" aria-label="Email">Email</a>
      {%- endif -%}
      <a href="{{ '/feed.xml' | relative_url }}" aria-label="RSS feed">RSS</a>
    </div>
    <p class="copyright">&copy; {{ 'now' | date: "%Y" }} {{ site.author.name }}. All rights reserved.</p>
  </div>
</footer>
