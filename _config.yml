# --- Build settings ---
markdown: kramdown
permalink: /:year/:month/:day/:title/
timezone: Asia/Taipei

sass:
  style: compressed

# GitHub Pages allowlisted plugins only (built-in --safe mode)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# --- Front-matter defaults ---
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: default

# --- Exclusions ---
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .jekyll-cache
